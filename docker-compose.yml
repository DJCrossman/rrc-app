# Parametrized dev stack for one RRC app instance.
#
# Driven by scripts/instance.ts, which sets INSTANCE + APP_PORT in the shell env
# and runs:  docker compose -p rrc-<name> up -d --build
#
# The compose project name (-p rrc-<name>) namespaces the container, network, and
# named volumes per instance, so multiple instances run side-by-side without
# sharing node_modules / .next / generated client.

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: rrc-app-dev:${INSTANCE}
    container_name: rrc-${INSTANCE}-app
    # Per-instance secrets + DB connection strings, generated by instance.ts.
    env_file:
      - ./docker/env/${INSTANCE}.env
    environment:
      - INSTANCE=${INSTANCE}
      - NODE_ENV=development
      # Reach the host's native Ollama (see extra_hosts below). Set here so it
      # wins over anything in the env file.
      - OLLAMA_HOST=http://host.docker.internal:11434/api
      # File-watch polling — FS events don't cross the macOS bind-mount boundary.
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
    ports:
      - "${APP_PORT}:3000"
    extra_hosts:
      # Lets the container reach the host's native Ollama on :11434.
      - "host.docker.internal:host-gateway"
    volumes:
      # Live source for hot reload.
      - ./:/app
      # Linux-native artifacts — these named volumes shadow the host's darwin
      # copies projected by the bind mount (the deeper mount wins).
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      - prisma_client:/app/src/generated

volumes:
  node_modules:
  next_cache:
  prisma_client:
